# @package _global_
# Benchmark configuration — loaded by Hydra
defaults:
  - _self_

seed: 42

paths:
  output_dir: outputs/benchmarks

benchmark:
  n_warmup: 10
  n_runs: 100
  input_shape: [1, 3, 224, 224]
  device: cpu

mlflow:
  experiment_name: edgevision-benchmark
  tracking_uri: mlruns
  run_name: null
