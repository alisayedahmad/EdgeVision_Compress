# @package _global_
# Top-level Hydra config for structured channel pruning.

defaults:
  - model: resnet50
  - data: mvtec
  - _self_

seed: 42

paths:
  data_dir: data/mvtec
  output_dir: outputs/structured_pruning
  checkpoint_dir: outputs/checkpoints

training:
  batch_size: 32
  num_workers: 4

mlflow:
  experiment_name: edgevision-pruning-structured
  tracking_uri: mlruns
  run_name: null

compression:
  structured:
    prune_ratio: 0.3              # fraction of conv2 filters to remove globally
    min_channels: 4               # minimum channels preserved per block
    n_calibration_batches: 20     # batches used to estimate Taylor scores
    finetune_epochs: 10           # epochs of fine-tuning after pruning
    finetune_lr: 1.0e-5           # LR lower than baseline to avoid overwriting features